<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>ScenePick — 영화 장면 발견 관리</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">
  </head>
  <body class="app">
    <!-- Header Component -->
    <header class="header" id="main-header">
      <div class="header__content">
        <div class="header__top-row">
          <div class="header__left">
            <!-- Back Button (Detail, Settings) -->
            <button class="header__icon-btn header__back-btn" id="header-back-btn" style="display: none;">
              <i class="icon-chevron-left"></i>
            </button>
            
            <!-- Logo (Home) -->
            <div class="header__logo" id="header-logo">
              <span class="header__logo-text">ScenePick</span>
              <i class="icon-diamond"></i>
            </div>
            
            <!-- Page Title (Collection, Detail, Settings) -->
            <h1 class="header__title" id="header-title" style="display: none;">컬렉션</h1>
          </div>
          
          <div class="header__right">
            <button class="header__profile-btn" id="header-profile-btn">
              <i class="icon-user-profile"></i>
            </button>
          </div>
        </div>

        <!-- Search & Filter Area (Home, Collection) -->
        <div class="header__bottom-area" id="header-bottom-area">
          <div class="search-bar">
            <div class="search-bar__wrapper">
              <input
                type="text"
                class="search-bar__input"
                placeholder="텍스트 플레이스 홀더"
              />
              <i class="search-bar__icon icon-search"></i>
            </div>
          </div>
          <div class="filters">
            <button class="filters__chip filters__chip--active">전체</button>
            <button class="filters__chip">최신순</button>
            <button class="filters__chip">오래된순</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main">
      <!-- Home Screen: Movie Bundle Feed -->
      <section id="screen-home" class="screen screen--active">
        <div class="scene-list" id="scene-feed">
          <!-- Movie Bundle Cards will be injected here -->
        </div>
      </section>

      <!-- Collection Screen: Saved Movies (Grid Layout) -->
      <section id="screen-collection" class="screen">
        <div class="collection-grid" id="collection-feed">
          <!-- Collected Movie Posters will be injected here -->
        </div>
      </section>

      <!-- Movie List Screen (Deprecated in IA redesign) -->
      <section id="screen-movies" class="screen">
        <div class="movie-grid" id="movie-list">
          <!-- Movie List functionality integrated into Home -->
        </div>
      </section>

      <!-- Movie Detail Screen -->
      <section id="screen-detail" class="screen">
        <div class="movie-detail" id="movie-detail-view">
          <!-- Movie Detail Content will be injected here -->
        </div>
      </section>

      <!-- Settings Screen (My Profile) [V5] -->
      <section id="screen-settings" class="screen">
        <div class="profile-container">
          <!-- Profile Card -->
          <div class="profile-card">
            <div class="profile-card__avatar">
              <img src="img/icons/icon-user-profile-empty.svg" alt="Profile" />
            </div>
            <div class="profile-card__info">
              <div class="profile-card__name-wrap">
                <h2 class="profile-card__name">김신준</h2>
                <div class="badge-v2 violet">멤버십</div>
              </div>
              <p class="profile-card__email">shinjoon@scenepick.com</p>
            </div>
          </div>

          <!-- Point Status -->
          <div class="point-status">
            <span class="point-status__label">보유 포인트</span>
            <div class="point-status__value">
              <span class="point-status__amount">2,450</span>
              <span class="point-status__unit">P</span>
            </div>
          </div>

          <!-- Settings Groups -->
          <div class="settings-group">
            <h3 class="settings-group__title">계정 설정</h3>
            <div class="settings-list">
              <div class="list-row-v2">
                <div class="list-row-v2__left">
                  <i class="icon-user"></i>
                  <span>개인정보 관리</span>
                </div>
                <i class="icon-chevron-right gray"></i>
              </div>
              <div class="list-row-v2">
                <div class="list-row-v2__left">
                  <i class="icon-bell"></i>
                  <span>알림 설정</span>
                </div>
                <i class="icon-chevron-right gray"></i>
              </div>
            </div>
          </div>

          <div class="settings-group">
            <h3 class="settings-group__title">기타</h3>
            <div class="settings-list">
              <div class="list-row-v2" id="toggle-dark-mode">
                <div class="list-row-v2__left">
                  <i class="icon-dark-mode"></i>
                  <span>다크 모드</span>
                </div>
                <div class="toggle-switch" id="dark-mode-toggle-v5">
                  <div class="toggle-switch__knob"></div>
                </div>
              </div>
              <div class="list-row-v2">
                <div class="list-row-v2__left">
                  <i class="icon-diamond"></i>
                  <span>버전 정보</span>
                </div>
                <span class="version-text">v1.2.0</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation Component [V2] -->
    <nav class="bottom-nav">
      <div class="bottom-nav__buttons-wrap">
        <div id="nav-home" class="bottom-nav__button active" onclick="navigateTo('home')">
          <div class="bottom-nav__icon-box"><div class="nav-icon pick"></div></div>
          <p class="bottom-nav__label">픽</p>
        </div>
        <div id="nav-collection" class="bottom-nav__button" onclick="navigateTo('collection')">
          <div class="bottom-nav__icon-box"><div class="nav-icon collection"></div></div>
          <p class="bottom-nav__label">콜렉션</p>
        </div>
      </div>
    </nav>

    <!-- Bottom Sheet [V2] -->
    <div id="bottom-sheet" class="bottom-sheet">
      <div class="bottom-sheet__overlay" onclick="closeBottomSheet()"></div>
      <div class="bottom-sheet__content">
        <div class="bottom-sheet__handle"></div>
        <div id="bottom-sheet-body" class="bottom-sheet__body">
          <!-- Dynamic content (Movie Details) injected here -->
        </div>
      </div>
    </div>

    <!-- Overlay: Save Loading & Matching -->
    <div id="save-overlay" class="overlay">
      <div class="matching-status">
        <div class="matching-status__loader"></div>
        <p class="matching-status__text">영화 정보를 분석하고 있습니다...</p>
      </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- YouTube Transition Modal -->
    <div id="youtube-modal" class="modal-overlay">
      <div class="modal">
        <p class="modal__text">공유했던 유튜브 쇼츠로 이동할까요?</p>
        <div class="modal__actions">
          <button class="modal__btn modal__btn--cancel">취소</button>
          <button class="modal__btn modal__btn--move">이동</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
